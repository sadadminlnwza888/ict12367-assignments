<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gallery - 68043407 วรพัธน์ ด้วงแก้ว</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(135deg, #16213e, #0f3460);
            border-bottom: 3px solid #e94560;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }

        header p {
            margin-top: 8px;
            font-size: 1rem;
            color: #a8b2d1;
        }

        .gallery-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto;
            gap: 16px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay span {
            font-size: 0.9rem;
            color: #fff;
            font-weight: 500;
        }

        /* Center featured image - spans 2 columns and 2 rows */
        .gallery-item.featured {
            grid-column: 2 / 3;
            grid-row: 1 / 3;
        }

        .gallery-item.featured img {
            min-height: 100%;
        }

        /* Standard items have fixed height */
        .gallery-item:not(.featured) {
            height: 220px;
        }

        /* Bottom row items */
        .gallery-item.bottom {
            height: 250px;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: #a8b2d1;
            font-size: 0.85rem;
            border-top: 1px solid #2a2a4a;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .gallery-item.featured {
                grid-column: 1 / -1;
                grid-row: auto;
                height: 300px;
            }

            .gallery-item:not(.featured) {
                height: 180px;
            }

            header h1 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .gallery-item.featured {
                height: 250px;
            }

            .gallery-item:not(.featured) {
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Gallery - 68043407 วรพัธน์ ด้วงแก้ว</h1>
        <p>A collection of beautiful images</p>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid">

            <!-- Row 1, Col 1 -->
            <div class="gallery-item">
                <img src="https://picsum.photos/400/300?random=1" alt="Gallery Image 1">
                <div class="overlay"><span>Photo 1</span></div>
            </div>

            <!-- Row 1-2, Col 2 (Featured / Large Center) -->
            <div class="gallery-item featured">
                <img src="https://picsum.photos/600/600?random=2" alt="Gallery Image 2 - Featured">
                <div class="overlay"><span>Featured Photo</span></div>
            </div>

            <!-- Row 1, Col 3 -->
            <div class="gallery-item">
                <img src="https://picsum.photos/400/300?random=3" alt="Gallery Image 3">
                <div class="overlay"><span>Photo 3</span></div>
            </div>

            <!-- Row 2, Col 1 -->
            <div class="gallery-item">
                <img src="https://picsum.photos/400/300?random=4" alt="Gallery Image 4">
                <div class="overlay"><span>Photo 4</span></div>
            </div>

            <!-- Row 2, Col 3 -->
            <div class="gallery-item">
                <img src="https://picsum.photos/400/300?random=5" alt="Gallery Image 5">
                <div class="overlay"><span>Photo 5</span></div>
            </div>

            <!-- Bottom row spanning full width as 3 columns -->
            <div class="gallery-item bottom">
                <img src="https://picsum.photos/400/300?random=6" alt="Gallery Image 6">
                <div class="overlay"><span>Photo 6</span></div>
            </div>

            <div class="gallery-item bottom">
                <img src="https://picsum.photos/400/300?random=7" alt="Gallery Image 7">
                <div class="overlay"><span>Photo 7</span></div>
            </div>

            <div class="gallery-item bottom">
                <img src="https://picsum.photos/400/300?random=8" alt="Gallery Image 8">
                <div class="overlay"><span>Photo 8</span></div>
            </div>

        </div>
    </div>

    <footer>
        <p>68043407 วรพัธน์ ด้วงแก้ว | Image Gallery Assignment</p>
    </footer>

</body>
</html>
