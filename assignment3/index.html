<html lang="th">
<head>
    <meta charset="UTF-8">

        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.92);
            border-radius: 16px;
            padding: 40px 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        h2.student-info {
            color: #e74c3c;
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .student-number {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        .char-counter-section {
            margin-top: 10px;
        }

        .char-counter-section label {
            display: block;
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .char-counter-section textarea {
            width: 100%;
            height: 120px;
            padding: 14px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: vertical;
            transition: border-color 0.3s;
            outline: none;
        }

        .char-counter-section textarea:focus {
            border-color: #3498db;
        }

        .counter-display {
            margin-top: 10px;
            font-size: 1.05rem;
            color: #333;
        }

        .counter-display span {
            font-weight: 600;
            color: #e74c3c;
            font-size: 1.2rem;
        }

        .info-list {
            margin-bottom: 25px;
            line-height: 2;
            font-size: 1rem;
            color: #444;
        }

        .info-list strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Assignment Lab 3</h1>

        <h2 class="student-info">รหัสนักศึกษา: 68043407 ชื่อ: วรพัธน์ ด้วงแก้ว</h2>
        <p class="student-number">ลำดับเลขที่ 15</p>

        <div class="info-list">
            <p><strong>รายวิชา:</strong> Digital Learning</p>
            <p><strong>ใบงานที่:</strong> 3</p>
            <p><strong>เรื่อง:</strong> การสร้างหน้าเว็บด้วย HTML &amp; CSS</p>
        </div>

        <div class="char-counter-section">
            <label for="textInput">Character Counter (ตัวนับจำนวนตัวอักษร)</label>
            <textarea id="textInput" placeholder="พิมพ์ข้อความที่นี่..." oninput="countChars()"></textarea>
            <p class="counter-display">จำนวนตัวอักษร: <span id="charCount">0</span> ตัว</p>
        </div>
    </div>

    <script>
        function countChars() {
            var text = document.getElementById('textInput').value;
            document.getElementById('charCount').textContent = text.length;
        }
    </script>
</body>
</html>
